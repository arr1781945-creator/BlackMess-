name: Django CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.9, 3.10, 3.11, 3.12]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_blackmess
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev \
          libpq-dev \
          build-essential

    - name: 📚 Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pytest pytest-django pytest-cov

    - name: 🔍 Lint with flake8
      run: |
        pip install flake8
        # Stop build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: 🔒 Security check with bandit
      run: |
        pip install bandit
        bandit -r . -ll
      continue-on-error: true

    - name: 📋 Check for missing migrations
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_blackmess
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: 'False'
      run: |
        python manage.py makemigrations --check --dry-run --no-input

    - name: 🗄️ Run migrations
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_blackmess
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: 'False'
      run: |
        python manage.py migrate --no-input

    - name: 🧪 Run tests
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_blackmess
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: 'False'
      run: |
        python manage.py test --no-input --parallel

    - name: 📊 Generate coverage report
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_blackmess
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: 'False'
      run: |
        pip install coverage
        coverage run --source='.' manage.py test
        coverage report
        coverage xml
      continue-on-error: true

    - name: 📈 Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

    - name: ✅ All tests passed!
      run: echo "🎉 All tests passed successfully!"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🏗️ Collect static files
      env:
        SECRET_KEY: build-secret-key
        DEBUG: 'False'
      run: |
        python manage.py collectstatic --no-input
      continue-on-error: true

    - name: ✅ Build successful!
      run: echo "🎉 Build completed successfully!"
