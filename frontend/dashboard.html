<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackMess - Workspace</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Layout */
        .app-container {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #4A154B 0%, #2C0A2E 100%);
            display: flex;
            flex-direction: column;
            color: white;
        }
        
        .workspace-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .workspace-header:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .workspace-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .workspace-status {
            font-size: 13px;
            opacity: 0.7;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }
        
        .nav-section {
            margin-bottom: 24px;
        }
        
        .nav-section-header {
            padding: 0 20px 8px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-add-btn {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .nav-add-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .nav-item {
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .nav-item.active {
            background: #1264A3;
            border-left: 3px solid #2BAC76;
        }
        
        .nav-item-icon {
            font-size: 18px;
        }
        
        .nav-item-text {
            flex: 1;
            font-size: 15px;
        }
        
        .nav-item-badge {
            background: #E01E5A;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .user-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .user-footer:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background: linear-gradient(135deg, #1264A3, #2BAC76);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-size: 15px;
            font-weight: 600;
        }
        
        .user-status {
            font-size: 12px;
            opacity: 0.7;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .channel-header {
            height: 64px;
            border-bottom: 1px solid #E0E0E0;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .channel-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .channel-name {
            font-size: 18px;
            font-weight: 700;
            color: #1d1c1d;
        }
        
        .channel-desc {
            font-size: 14px;
            color: #616061;
        }
        
        .channel-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .icon-btn:hover {
            background: #f8f8f8;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            transition: all 0.15s;
        }
        
        .message:hover {
            background: #f8f8f8;
            margin: 0 -8px;
            padding: 8px;
            border-radius: 4px;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background: linear-gradient(135deg, #4A154B, #1264A3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        
        .message-content {
            flex: 1;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .message-author {
            font-weight: 700;
            font-size: 15px;
            color: #1d1c1d;
        }
        
        .message-time {
            font-size: 12px;
            color: #616061;
        }
        
        .message-text {
            font-size: 15px;
            color: #1d1c1d;
            line-height: 1.5;
        }
        
        .message-input-area {
            padding: 20px;
            border-top: 1px solid #E0E0E0;
        }
        
        .message-input-wrapper {
            border: 2px solid #868686;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.15s;
        }
        
        .message-input-wrapper:focus-within {
            border-color: #1264A3;
            box-shadow: 0 0 0 4px rgba(18, 100, 163, 0.1);
        }
        
        .message-toolbar {
            padding: 8px;
            border-bottom: 1px solid #E0E0E0;
            display: flex;
            gap: 4px;
        }
        
        .toolbar-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .toolbar-btn:hover {
            background: #f8f8f8;
        }
        
        .message-input {
            width: 100%;
            padding: 12px;
            border: none;
            font-size: 15px;
            resize: none;
            min-height: 60px;
            font-family: inherit;
        }
        
        .message-input:focus {
            outline: none;
        }
        
        .send-btn {
            position: absolute;
            right: 32px;
            bottom: 32px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2BAC76, #1D8A5E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(43, 172, 118, 0.4);
            transition: all 0.15s;
        }
        
        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(43, 172, 118, 0.6);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.3);
        }
        
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
        }
        
        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #616061;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: white;
            border-radius: 8px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 15px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #868686;
            border-radius: 4px;
            font-size: 15px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #1264A3;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
        }
        
        .btn-primary {
            background: #4A154B;
            color: white;
        }
        
        .btn-primary:hover {
            background: #611f69;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="workspace-header" onclick="openWorkspaceMenu()">
                <div class="workspace-name" id="workspaceName">Loading...</div>
                <div class="workspace-status">⚡ Active</div>
            </div>

            <div class="sidebar-content">
                <!-- Channels -->
                <div class="nav-section">
                    <div class="nav-section-header">
                        <span>Channels</span>
                        <div class="nav-add-btn" onclick="showCreateChannel()">+</div>
                    </div>
                    <div id="channelsList">
                        <div class="nav-item active">
                            <span class="nav-item-icon">#</span>
                            <span class="nav-item-text">general</span>
                        </div>
                    </div>
                </div>

                <!-- Direct Messages -->
                <div class="nav-section">
                    <div class="nav-section-header">
                        <span>Direct Messages</span>
                        <div class="nav-add-btn" onclick="showNewDM()">+</div>
                    </div>
                    <div id="dmsList">
                        <div class="empty-state" style="padding: 20px; font-size: 13px;">
                            No direct messages yet
                        </div>
                    </div>
                </div>
            </div>

            <!-- User Footer -->
            <div class="user-footer" onclick="openProfileMenu()">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="userName">User</div>
                    <div class="user-status">🟢 Active</div>
                </div>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="white">
                    <path d="M3 6l5 5 5-5"/>
                </svg>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Channel Header -->
            <div class="channel-header">
                <div class="channel-info">
                    <div class="channel-name" id="channelName"># general</div>
                </div>
                <div class="channel-actions">
                    <div class="icon-btn" onclick="openSearch()" title="Search">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                            <circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="2"/>
                            <path d="M11 11l5 5" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="icon-btn" onclick="openChannelDetails()" title="Details">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                            <circle cx="9" cy="4" r="1.5"/>
                            <circle cx="9" cy="9" r="1.5"/>
                            <circle cx="9" cy="14" r="1.5"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="messages-area" id="messagesArea">
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <div>Belum ada pesan di channel ini</div>
                    <div style="font-size: 14px; margin-top: 8px;">Kirim pesan pertama untuk memulai!</div>
                </div>
            </div>

            <!-- Message Input -->
            <div class="message-input-area">
                <div class="message-input-wrapper">
                    <div class="message-toolbar">
                        <div class="toolbar-btn" title="Bold">
                            <svg width="16" height="16" viewBox="0 0 16 16">
                                <path d="M4 2h5a3 3 0 010 6H4V2zm0 6h6a3 3 0 010 6H4V8z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="toolbar-btn" title="Italic">
                            <svg width="16" height="16" viewBox="0 0 16 16">
                                <path d="M10 2h2L8 14H6l4-12z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="toolbar-btn" title="Link">
                            <svg width="16" height="16" viewBox="0 0 16 16">
                                <path d="M7 5l-4 4 4 4M9 5l4 4-4 4" stroke="currentColor" fill="none" stroke-width="2"/>
                            </svg>
                        </div>
                        <div class="toolbar-btn" onclick="document.getElementById('fileInput').click()" title="Upload">
                            <svg width="16" height="16" viewBox="0 0 16 16">
                                <path d="M8 2v8M5 7l3-3 3 3" stroke="currentColor" fill="none" stroke-width="2"/>
                            </svg>
                        </div>
                        <input type="file" id="fileInput" style="display: none;">
                    </div>
                    <textarea 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="Type a message..."
                        onkeydown="handleMessageKeydown(event)"
                    ></textarea>
                </div>
                <div class="send-btn" onclick="sendMessage()">
                    <svg width="24" height="24" viewBox="0 0 24 24">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="white"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load user data
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const workspaceData = JSON.parse(localStorage.getItem('workspace_data') || '{}');
        
        document.getElementById('userName').textContent = user.first_name || user.username || 'User';
        document.getElementById('userAvatar').textContent = (user.first_name || user.username || 'U').charAt(0).toUpperCase();
        document.getElementById('workspaceName').textContent = workspaceData.name || 'Workspace';
        
        // Messages array
        let messages = [];
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            const message = {
                id: Date.now(),
                user: user,
                content: content,
                timestamp: new Date()
            };
            
            messages.push(message);
            renderMessages();
            
            input.value = '';
            input.style.height = 'auto';
        }
        
        function handleMessageKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function renderMessages() {
            const container = document.getElementById('messagesArea');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <div>Belum ada pesan di channel ini</div>
                        <div style="font-size: 14px; margin-top: 8px;">Kirim pesan pertama untuk memulai!</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message">
                    <div class="message-avatar">${(msg.user.first_name || 'U').charAt(0).toUpperCase()}</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-author">${msg.user.first_name || msg.user.username}</span>
                            <span class="message-time">${formatTime(msg.timestamp)}</span>
                        </div>
                        <div class="message-text">${escapeHtml(msg.content)}</div>
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }
        
        function formatTime(date) {
            const d = new Date(date);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showCreateChannel() {
            alert('Create channel feature coming soon!');
        }
        
        function showNewDM() {
            alert('New DM feature coming soon!');
        }
        
        function openSearch() {
            alert('Search feature (Ctrl+K) coming soon!');
        }
        
        function openChannelDetails() {
            alert('Channel details coming soon!');
        }
        
        function openWorkspaceMenu() {
            alert('Workspace menu coming soon!');
        }
        
        function openProfileMenu() {
            alert('Profile menu coming soon!');
        }
        
        // Check if user is logged in
        if (!user.email) {
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
    <script src="js/complete-auth.js"></script>
    <script src="js/dashboard-integration.js"></script>
    <script src="js/websocket-integration.js"></script>
    <script src="js/file-upload-integration.js"></script>
    <script src="js/features-integration.js"></script>
    <script src="js/master-integration.js"></script>
