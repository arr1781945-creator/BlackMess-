{% extends "admin/base_site.html" %}
{% block content %}
<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
    <div style="background: #417690; color: white; padding: 20px; border-radius: 10px;">
        <h3>Total Users</h3>
        <p style="font-size: 24px;">{{ stats.total_users }}</p>
    </div>
    <div style="background: #264b5d; color: white; padding: 20px; border-radius: 10px;">
        <h3>Total Messages</h3>
        <p style="font-size: 24px;">{{ stats.total_messages }}</p>
    </div>
    <div style="background: #102834; color: white; padding: 20px; border-radius: 10px;">
        <h3>Messages Today</h3>
        <p style="font-size: 24px;">{{ stats.messages_today }}</p>
    </div>
</div>
{{ block.super }}
{% endblock %}
